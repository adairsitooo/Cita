<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Pregunta Importante</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tarjeta Principal -->
    <div id="proposal-card" class="card">
        <h1>¿Quisieras salir conmigo?</h1>
        <div class="btn-container">
            <button id="btn-yes" class="btn">Sí</button>
            <button id="btn-no" class="btn">No</button>
        </div>
    </div>

    <!-- Tarjeta de Respuesta -->
    <div id="love-card" class="card hidden">
        <div class="heart-icon">❤️</div>
        <h1>¡Sabía que dirías que sí!</h1>
        <p class="subtitle">Armemos nuestro plan ideal:</p>
        
        <form id="details-form">
            <div class="input-group">
                <label for="actividad">¿Qué te gustaría hacer?</label>
                <input type="text" id="actividad" placeholder="Ej: Comer pizza, ir por un café..." required>
            </div>

            <div class="input-group">
                <label for="lugar">Lugar (Google Maps)</label>
                <div class="input-row">
                    <input type="text" id="lugar" placeholder="Ej: Antigua Guatemala" required>
                    <button type="button" id="btn-open-maps" class="btn-geo" title="Buscar en Google Maps">🗺️ Buscar</button>
                </div>
            </div>
            
            <div class="input-group">
                <label for="fecha">¿Qué día?</label>
                <input type="date" id="fecha" required>
            </div>
            
            <div class="input-group">
                <label for="hora">¿A qué hora?</label>
                <input type="time" id="hora" required>
            </div>

            <div class="input-group">
                <label for="mensaje-personal">Tu mensaje para mí</label>
                <textarea id="mensaje-personal" placeholder="Escribe aquí lo que quieras decirme..." rows="4" required></textarea>
            </div>
            
            <button type="submit" id="btn-send" class="btn">Confirmar en WhatsApp</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
